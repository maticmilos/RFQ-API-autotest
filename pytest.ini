[pytest]
markers =
    severity_low: Low severity bugs
    severity_medium: Medium severity bugs
    severity_high: High severity bugs
    priority_low: Low priority bugs
    priority_medium: Medium priority bugs
    priority_high: High priority bugs
    negative: Negative test scenarios (API errors, failures)
    positive: Positive test scenarios (wrong behavior when API works)

addopts =
    --html=reports/report.html
    --self-contained-html

log_cli = true
log_level = DEBUG
log_format = %(asctime)s - %(levelname)s - %(message)s
log_file = logs/test_execution.log